    <meta name="description" content="説明文が入ります">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="wrapper">
        <nav id="nav">
            <h2><a href="index.html">MyProfile</a></h2>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#works">Works</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <img id="mainvisual" src="images/main.png" alt="メインビジュアル">

        <section id="about" class="wrapper">
            <h2 class="section-title">About</h2>

            <div id="about-con">
                <img id="about-img" src="images/about.png" alt="顔">

                <div id="about-item">
                    <h3>Kazuki Asahina</h3>
                    <p>25歳 長野県佐久市出身</p>
                    <p>ソフトウェア業界でマーケティングに従事</p>  
                    <p>趣味はカメラ、愛機はCanon</p>
                    <p>自然を撮影するのが好きで、海や山によく行く</p>
                </div>
            </div>
        </section>

        <section id="works" class="wrapper">
            <h2 class="section-title">Works</h2>

            <div id="works-con">
                <div class="works-item">
                    <img class="works-img" src="images/works1.png" alt="1">
                    <p>新潟に訪れた際に、日本海の雄大さに魅了されて撮影した1枚</p>
                </div>

                <div class="works-item">
                    <img class="works-img" src="images/works2.png" alt="2">
                    <p>地元長野の木曽町から撮影した、冠雪した御嶽山</p>
                </div>

                <div class="works-item">
                    <img class="works-img" src="images/works3.png" alt="3">
                    <p>京都で撮影した、明け方の古き良き日本の町並み</p>
                </div>
            </div>

        </section>
    </main>
</body>
